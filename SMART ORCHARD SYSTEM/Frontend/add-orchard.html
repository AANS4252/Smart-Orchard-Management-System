<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add Orchard</title>

    <link rel="stylesheet" href="css/add-orchard.css" />
  </head>

  <body>
    <div class="container">
      <h1>Add New Orchard</h1>

      <form id="orchardForm">
        <input type="text" id="name" placeholder="Orchard Name" required />

        <input type="text" id="location" placeholder="Location" required />

        <input type="text" id="crop" placeholder="Crop Type" required />

        <input type="text" id="area" placeholder="Area (Marla)" required />

        <input type="number" id="year" placeholder="Planting Year" required />

        <button type="submit">Save Orchard</button>
      </form>
    </div>

    <script src="js/add-orchard.js"></script>
  </body>
</html>
